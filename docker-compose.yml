services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: sendrify
      DB_USER: sendrify
      DB_PASS: ${DB_PASS:-sendrify_secret}
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - pdf_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_secret}
      MARIADB_DATABASE: sendrify
      MARIADB_USER: sendrify
      MARIADB_PASSWORD: ${DB_PASS:-sendrify_secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  pdf_storage:
